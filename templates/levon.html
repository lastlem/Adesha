<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levon's Cozy Corner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-1: #fbcfe8;
            --bg-color-2: #ddd6fe;
            --bg-color-3: #e0e7ff;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .font-romantic {
            font-family: 'Pacifico', cursive;
        }
        .shadow-soft {
            box-shadow: 0 10px 30px -10px rgba(244, 114, 182, 0.3);
        }
        .envelope-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }
        .envelope-card:hover {
            transform: translateY(-15px) scale(1.05);
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(244, 114, 182, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
        }
        .floating {
            animation: floating 5s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .heart {
            position: absolute;
            color: rgba(244, 114, 182, 0.4);
            pointer-events: none;
            animation: rise var(--duration) linear infinite;
            z-index: 0;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            z-index: 100;
        }
    </style>
</head>
<body class="relative p-4 md:p-8">
    <div id="bg-effects"></div>

    <!-- Character Placeholders -->
    <div class="fixed top-8 left-8 w-32 h-32 z-10 pointer-events-none floating opacity-90">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=chiikawa&backgroundColor=fbcfe8" alt="Chiikawa" class="w-full h-full object-contain">
    </div>
    <div class="fixed top-8 right-8 w-32 h-32 z-10 pointer-events-none floating opacity-90" style="animation-delay: 0.8s;">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=hachiware&backgroundColor=ddd6fe" alt="Hachiware" class="w-full h-full object-contain">
    </div>
    <div class="fixed bottom-8 left-8 w-32 h-32 z-10 pointer-events-none floating opacity-90" style="animation-delay: 1.6s;">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=usagi&backgroundColor=e0e7ff" alt="Usagi" class="w-full h-full object-contain">
    </div>
    <div class="fixed bottom-8 right-8 w-32 h-32 z-10 pointer-events-none floating opacity-90" style="animation-delay: 2.4s;">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=chopper&backgroundColor=fbcfe8" alt="Chopper" class="w-full h-full object-contain">
    </div>

    <!-- Header -->
    <header class="text-center mb-16 mt-12 relative z-10">
        <h1 class="font-romantic text-6xl md:text-7xl text-pink-400 drop-shadow-sm mb-4">
            Levon's Cozy Corner
        </h1>
        <p class="text-pink-300 text-xl md:text-2xl font-medium italic opacity-80">
            "Open When..." ✨
        </p>
        <button id="add-btn" class="mt-8 bg-white/60 backdrop-blur-md text-pink-400 px-8 py-3 rounded-full font-bold shadow-soft hover:bg-white hover:scale-105 transition-all duration-300 border border-pink-200">
            + Add Love Letter
        </button>
    </header>

    <!-- Envelopes Grid -->
    <main class="max-w-5xl mx-auto relative z-10">
        <div id="envelope-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-10 p-4">
            <div class="col-span-full text-center text-pink-300 animate-pulse">
                Loading love letters... 🌸
            </div>
        </div>
    </main>

    <!-- Content Modal (Opening Envelope) -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white/90 backdrop-blur-lg rounded-[3rem] shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto relative animate-in fade-in zoom-in duration-300 border-4 border-pink-100">
            <button id="close-modal" class="absolute top-6 right-6 text-pink-300 hover:text-pink-500 transition-colors text-3xl font-bold px-2">&times;</button>
            <div class="p-8 md:p-12 text-center">
                <h2 id="modal-title" class="font-romantic text-4xl text-pink-400 mb-8"></h2>
                <div class="space-y-8">
                    <div id="modal-image-container" class="hidden">
                        <img id="modal-image" src="" alt="Memory" class="rounded-[2rem] w-full object-cover shadow-soft max-h-72 mx-auto border-4 border-white">
                    </div>
                    <p id="modal-text" class="text-gray-600 leading-relaxed text-xl italic font-medium"></p>
                    <div id="modal-audio-container" class="hidden flex flex-col items-center gap-4">
                        <p class="text-xs text-pink-300 font-bold uppercase tracking-widest">Listen to this 🎵</p>
                        <audio id="modal-audio" controls class="w-full max-w-xs h-12 rounded-full"></audio>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Form Modal -->
    <div id="form-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white/90 backdrop-blur-lg rounded-[3rem] shadow-2xl max-w-lg w-full p-8 relative animate-in fade-in zoom-in duration-300 border-4 border-pink-100">
            <button id="close-form" class="absolute top-6 right-6 text-pink-300 hover:text-pink-500 transition-colors text-3xl font-bold px-2">&times;</button>
            <h2 id="form-title-heading" class="font-romantic text-3xl text-pink-400 mb-8 text-center">New Love Letter 🌸</h2>
            <form id="envelope-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-sm font-semibold text-pink-300 mb-2">Envelope Title</label>
                    <input type="text" id="form-title" required placeholder="Open when..."
                        class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none transition-colors bg-white/50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-pink-300 mb-2">Your Message</label>
                    <textarea id="form-text" required rows="4" placeholder="Write something sweet..."
                        class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 focus:border-pink-300 focus:outline-none transition-colors bg-white/50"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-pink-300 mb-2">Image</label>
                        <input type="file" id="form-image" accept="image/*"
                            class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-pink-300 mb-2">Audio</label>
                        <input type="file" id="form-audio" accept="audio/*"
                            class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-pink-300 hover:bg-pink-400 text-white font-bold py-3 rounded-2xl transition-all shadow-soft">
                    Save Envelope ✨
                </button>
            </form>
        </div>
    </div>

    <script>
        const user = "{{ user }}";
        const envelopeGrid = document.getElementById('envelope-grid');
        const modal = document.getElementById('modal');
        const closeModal = document.getElementById('close-modal');
        const formModal = document.getElementById('form-modal');
        const closeForm = document.getElementById('close-form');
        const addBtn = document.getElementById('add-btn');
        const envelopeForm = document.getElementById('envelope-form');

        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const modalImage = document.getElementById('modal-image');
        const modalImageContainer = document.getElementById('modal-image-container');
        const modalAudio = document.getElementById('modal-audio');
        const modalAudioContainer = document.getElementById('modal-audio-container');

        const formTitle = document.getElementById('form-title');
        const formText = document.getElementById('form-text');
        const formImage = document.getElementById('form-image');
        const formAudio = document.getElementById('form-audio');
        const editId = document.getElementById('edit-id');
        const submitBtn = document.getElementById('submit-btn');
        const formTitleHeading = document.getElementById('form-title-heading');

        function createHearts() {
            const container = document.getElementById('bg-effects');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.setProperty('--duration', Math.random() * 5 + 5 + 's');
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 10000);
            }, 600);
        }

        async function fetchEnvelopes() {
            try {
                const response = await fetch(`/api/envelopes/${user}`);
                const data = await response.json();
                renderEnvelopes(data);
            } catch (error) {
                console.error('Error fetching envelopes:', error);
                envelopeGrid.innerHTML = '<p class="col-span-full text-center text-red-300">Oops! Something went wrong. ☁️</p>';
            }
        }

        function renderEnvelopes(envelopes) {
            if (envelopes.length === 0) {
                envelopeGrid.innerHTML = '<p class="col-span-full text-center text-pink-300">No letters here yet... 🌸</p>';
                return;
            }

            envelopeGrid.innerHTML = '';
            envelopes.forEach(env => {
                const card = document.createElement('div');
                card.className = 'envelope-card p-10 rounded-[2.5rem] cursor-pointer text-center group relative';
                card.innerHTML = `
                    <div class="text-5xl mb-6 group-hover:scale-110 transition-transform duration-500">✉️</div>
                    <h3 class="font-romantic text-3xl text-pink-400">${env.title}</h3>
                    <p class="text-pink-200 text-sm mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-500">Open letter ✨</p>
                    <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <button onclick="event.stopPropagation(); startEdit(${JSON.stringify(env).replace(/"/g, '&quot;')})" class="p-2 bg-white/80 text-blue-400 rounded-full hover:bg-white transition-all shadow-sm">✎</button>
                        <button onclick="event.stopPropagation(); deleteEnvelope(${env.id})" class="p-2 bg-white/80 text-red-400 rounded-full hover:bg-white transition-all shadow-sm">🗑</button>
                    </div>
                `;
                card.onclick = () => openEnvelope(env);
                envelopeGrid.appendChild(card);
            });
        }

        function openEnvelope(env) {
            modalTitle.textContent = env.title;
            modalText.textContent = env.text_message;

            if (env.image_path) {
                modalImage.src = env.image_path;
                modalImageContainer.classList.remove('hidden');
            } else {
                modalImageContainer.classList.add('hidden');
            }

            if (env.audio_path) {
                modalAudio.src = env.audio_path;
                modalAudioContainer.classList.remove('hidden');
            } else {
                modalAudioContainer.classList.add('hidden');
                modalAudio.pause();
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        async function deleteEnvelope(id) {
            if (!confirm('Are you sure you want to delete this love letter? 🌸')) return;
            try {
                const response = await fetch(`/api/envelopes/${id}`, { method: 'DELETE' });
                if (response.ok) fetchEnvelopes();
            } catch (error) {
                alert('Error deleting envelope');
            }
        }

        function startEdit(env) {
            editId.value = env.id;
            formTitle.value = env.title;
            formText.value = env.text_message;
            formTitleHeading.textContent = 'Edit Love Letter 🌸';
            submitBtn.textContent = 'Update Envelope ✨';
            formModal.classList.remove('hidden');
        }

        addBtn.onclick = () => {
            editId.value = '';
            formTitle.value = '';
            formText.value = '';
            formTitleHeading.textContent = 'New Love Letter 🌸';
            submitBtn.textContent = 'Save Envelope ✨';
            formModal.classList.remove('hidden');
        };

        closeForm.onclick = () => {
            formModal.classList.add('hidden');
        };

        envelopeForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', formTitle.value);
            formData.append('text_message', formText.value);
            formData.append('recipient', user);
            if (formImage.files[0]) formData.append('image', formImage.files[0]);
            if (formAudio.files[0]) formData.append('audio', formAudio.files[0]);

            const id = editId.value;
            const url = id ? `/api/envelopes/${id}` : '/api/envelopes';
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, { method, body: formData });
                if (response.ok) {
                    formModal.classList.add('hidden');
                    envelopeForm.reset();
                    fetchEnvelopes();
                }
            } catch (error) {
                alert('An error occurred while saving');
            }
        };

        closeModal.onclick = () => {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            modalAudio.pause();
        }

        window.onclick = (event) => {
            if (event.target === modal) closeModal.onclick();
            if (event.target === formModal) closeForm.onclick();
        };

        createHearts();
        fetchEnvelopes();
    </script>
</body>
</html>
